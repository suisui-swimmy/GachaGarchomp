<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#cfd2ab" />
    <title>GachaGarchomp</title>
    <link rel="icon" type="image/svg+xml" href="./assets/icons/favicon.svg" />
    <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png" />
    <link rel="manifest" href="./assets/icons/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="machine-stage" aria-labelledby="app-title">
        <div class="title-block">
          <p class="brand">GachaGarchomp</p>
          <h1 id="app-title">今日のメガシンカを引く</h1>
        </div>

        <div class="gacha-machine" id="gachaMachine" data-state="idle">
          <div class="machine-shadow" aria-hidden="true"></div>
          <img class="part character-layer body-closed" src="./assets/garchomp-body.svg" alt="" />
          <img class="part character-layer body-open" src="./assets/garchomp-mouthopen.svg" alt="" />
          <img class="part character-layer arm-idle" src="./assets/garchomp-arm-idle.svg" alt="" />
          <img class="part character-layer arm-pulled" src="./assets/garchomp-arm-pulled.svg" alt="" />
          <img class="part steam steam-a" src="./assets/steam.svg" alt="" />
          <img class="part steam steam-b" src="./assets/steam.svg" alt="" />
          <img class="part steam steam-c" src="./assets/steam.svg" alt="" />
          <img class="part ball ball-closed" src="./assets/pokeball-close.svg" alt="" />
          <img class="part ball ball-open" src="./assets/pokeball-open.svg" alt="" />

          <button class="lever-hit-area" id="leverButton" type="button" aria-label="ガチャを引く"></button>

          <section class="result-panel" id="resultPanel" aria-live="polite">
            <p class="result-kicker">今日のメガシンカ</p>
            <h2 id="resultName">まだ未抽選</h2>
            <img class="result-sprite" id="resultSprite" src="" alt="" />
            <p id="resultText">レギュレーションM-Aの排出プールを読み込み中です。</p>
            <div class="party-list" id="partyList" aria-label="抽選詳細"></div>
          </section>
        </div>

        <div class="action-row">
          <button class="primary-button" id="drawButton" type="button">
            <span class="button-label">引く</span>
            <span class="button-loading">抽選中</span>
          </button>
        </div>

        <div class="social-share-area" aria-label="SNS共有">
          <button class="share-button" id="shareButton" type="button" aria-label="画像付きで結果を共有" title="画像付きで結果を共有" disabled>
            <img src="./assets/share.svg" alt="" aria-hidden="true" />
          </button>
          <button class="share-button" id="downloadButton" type="button" aria-label="SNS共有用画像をダウンロード" title="SNS共有用画像をダウンロード" disabled>
            <img src="./assets/download.svg" alt="" aria-hidden="true" />
          </button>
          <button class="share-button" id="copyButton" type="button" aria-label="共有文をコピー" title="共有文をコピー" disabled>
            <img src="./assets/content-copy.svg" alt="" aria-hidden="true" />
          </button>
        </div>
      </section>

    </main>

    <img class="screen-flash-effect" id="screenFlashEffect" src="./assets/pokeball-open-effect.svg" alt="" aria-hidden="true" />
    <div class="screen-whiteout" id="screenWhiteout" aria-hidden="true"></div>

    <script src="./app.js"></script>
  </body>
</html>
